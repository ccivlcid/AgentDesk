<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 26">
  <!-- Heavy dark wood bookshelf with colorful vintage books + globe -->
  <rect x="1" y="1" width="18" height="24" rx="0.5" fill="#5c3a20" stroke="#3d2510" stroke-width="1.5"/>
  <rect x="2" y="2" width="16" height="7" fill="#4a2e18"/>
  <rect x="2" y="10" width="16" height="7" fill="#4a2e18"/>
  <rect x="2" y="18" width="16" height="6" fill="#4a2e18"/>
  <!-- Top shelf: globe -->
  <circle cx="10" cy="5.5" r="3" fill="#408888" stroke="#5c3a20" stroke-width="0.5"/>
  <line x1="7" y1="5.5" x2="13" y2="5.5" stroke="#7a8a40" stroke-width="0.4"/>
  <ellipse cx="10" cy="5.5" rx="1.5" ry="3" fill="none" stroke="#7a8a40" stroke-width="0.4"/>
  <!-- Middle shelf: books -->
  <rect x="3" y="11" width="2" height="5.5" fill="#e87830" stroke="#c06020" stroke-width="0.3"/>
  <rect x="5.5" y="11.5" width="1.8" height="5" fill="#d4a020" stroke="#8b5e3c" stroke-width="0.3"/>
  <rect x="7.8" y="11" width="2.2" height="5.5" fill="#7a8a40" stroke="#5c3a20" stroke-width="0.3"/>
  <rect x="10.5" y="11.5" width="1.5" height="5" fill="#c06020" stroke="#8b5e3c" stroke-width="0.3"/>
  <rect x="12.5" y="11" width="2" height="5.5" fill="#408888" stroke="#5c3a20" stroke-width="0.3"/>
  <rect x="15" y="11.5" width="2" height="5" fill="#e87830" stroke="#c06020" stroke-width="0.3"/>
  <!-- Bottom shelf: books -->
  <rect x="3" y="18.5" width="2.5" height="5" fill="#d4a020" stroke="#8b5e3c" stroke-width="0.3"/>
  <rect x="6" y="19" width="2" height="4.5" fill="#8b5e3c" stroke="#5c3a20" stroke-width="0.3"/>
  <rect x="8.5" y="18.5" width="2.5" height="5" fill="#c06020" stroke="#8b5e3c" stroke-width="0.3"/>
  <rect x="11.5" y="19" width="2" height="4.5" fill="#7a8a40" stroke="#5c3a20" stroke-width="0.3"/>
  <rect x="14" y="18.5" width="3" height="5" fill="#408888" stroke="#5c3a20" stroke-width="0.3"/>
</svg>