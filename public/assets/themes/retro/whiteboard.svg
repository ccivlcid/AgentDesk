<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 24">
  <!-- Cork bulletin board with pushpins and notes -->
  <rect x="1" y="1" width="38" height="22" rx="1" fill="#c09050" stroke="#5c3a20" stroke-width="2"/>
  <rect x="3" y="3" width="34" height="18" fill="#d4a868"/>
  <!-- Cork texture dots -->
  <circle cx="8" cy="8" r="0.5" fill="#b88848" opacity="0.5"/>
  <circle cx="20" cy="12" r="0.5" fill="#b88848" opacity="0.5"/>
  <circle cx="32" cy="7" r="0.5" fill="#b88848" opacity="0.5"/>
  <circle cx="15" cy="16" r="0.5" fill="#b88848" opacity="0.5"/>
  <!-- Note 1 -->
  <rect x="5" y="5" width="9" height="7" fill="#f5e8d0" transform="rotate(-3 9 8)" stroke="#8b5e3c" stroke-width="0.3"/>
  <circle cx="9" cy="5" r="1" fill="#e87830" stroke="#c06020" stroke-width="0.5"/>
  <!-- Note 2 -->
  <rect x="17" y="4" width="8" height="8" fill="#d4a020" transform="rotate(2 21 8)" stroke="#8b5e3c" stroke-width="0.3"/>
  <circle cx="21" cy="4.5" r="1" fill="#408888" stroke="#306666" stroke-width="0.5"/>
  <!-- Note 3 -->
  <rect x="28" y="6" width="7" height="6" fill="#e87830" transform="rotate(-1 31 9)" stroke="#c06020" stroke-width="0.3" opacity="0.8"/>
  <circle cx="31" cy="6" r="1" fill="#d4a020" stroke="#8b5e3c" stroke-width="0.5"/>
  <!-- Note 4 -->
  <rect x="8" y="14" width="10" height="5" fill="#7a8a40" opacity="0.6" transform="rotate(1 13 16)" stroke="#5c3a20" stroke-width="0.3"/>
  <circle cx="13" cy="14" r="1" fill="#c06020" stroke="#8b5e3c" stroke-width="0.5"/>
  <!-- Pin 5 -->
  <circle cx="26" cy="16" r="1" fill="#e87830" stroke="#c06020" stroke-width="0.5"/>
</svg>