  <line x1="15" y1="6" x2="18" y2="13" stroke="#5c3a20" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="8" y1="6.5" x2="6" y2="13" stroke="#5c3a20" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="6.5" x2="14" y2="13" stroke="#5c3a20" stroke-width="1.5" stroke-linecap="round"/>
</svg>