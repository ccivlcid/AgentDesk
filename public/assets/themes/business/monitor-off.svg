<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 18">
  <!-- Monitor bezel -->
  <rect x="1" y="0.5" width="26" height="14" rx="0.8" fill="#404858"/>
  <!-- Screen (off - dark gray) -->
  <rect x="2" y="1.5" width="24" height="12" rx="0.4" fill="#2a2e38"/>
  <!-- Subtle screen reflection -->
  <rect x="3" y="2" width="10" height="5" rx="0.3" fill="#363a44" opacity="0.4"/>
  <!-- Stand neck -->
  <rect x="12" y="14.5" width="4" height="2" fill="#c0c4cc"/>
  <!-- Stand base -->
  <ellipse cx="14" cy="17" rx="5" ry="0.8" fill="#c0c4cc"/>
  <!-- Power LED off -->
  <circle cx="14" cy="14" r="0.4" fill="#606878"/>
</svg>