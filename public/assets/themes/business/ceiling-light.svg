<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 10">
  <!-- Ceiling mount -->
  <rect x="8.5" y="0" width="3" height="1.5" rx="0.5" fill="#c0c4cc"/>
  <!-- Cable -->
  <line x1="10" y1="1.5" x2="10" y2="3.5" stroke="#8890a0" stroke-width="0.5"/>
  <!-- Light fixture body -->
  <rect x="3" y="3.5" width="14" height="2" rx="0.8" fill="#c0c4cc"/>
  <!-- Light fixture highlight -->
  <rect x="4" y="3.8" width="12" height="0.8" rx="0.4" fill="#dce0e6" opacity="0.6"/>
  <!-- Light surface (glowing) -->
  <rect x="4" y="5.5" width="12" height="1" rx="0.3" fill="#f8f8fa"/>
  <!-- Glow effect -->
  <rect x="3.5" y="6.5" width="13" height="2.5" rx="0.5" fill="#f8f8fa" opacity="0.15"/>
  <rect x="5" y="6.5" width="10" height="1.5" rx="0.3" fill="#f8f8fa" opacity="0.1"/>
</svg>