<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 18">
  <!-- Monitor bezel -->
  <rect x="1" y="0.5" width="26" height="14" rx="0.8" fill="#404858"/>
  <!-- Screen -->
  <rect x="2" y="1.5" width="24" height="12" rx="0.4" fill="#1a2a44"/>
  <!-- Blue screen glow -->
  <rect x="2" y="1.5" width="24" height="12" rx="0.4" fill="#4a7fc7" opacity="0.3"/>
  <!-- Screen content lines -->
  <rect x="4" y="4" width="12" height="0.8" rx="0.3" fill="#6a9fd7" opacity="0.5"/>
  <rect x="4" y="6" width="16" height="0.8" rx="0.3" fill="#6a9fd7" opacity="0.4"/>
  <rect x="4" y="8" width="10" height="0.8" rx="0.3" fill="#6a9fd7" opacity="0.3"/>
  <!-- Stand neck -->
  <rect x="12" y="14.5" width="4" height="2" fill="#c0c4cc"/>
  <!-- Stand base -->
  <ellipse cx="14" cy="17" rx="5" ry="0.8" fill="#c0c4cc"/>
  <!-- Power LED -->
  <circle cx="14" cy="14" r="0.4" fill="#4a7fc7"/>
</svg>