<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 28">
  <!-- Water bottle -->
  <path d="M4 1 Q4 0.5 5 0.5 L7 0.5 Q8 0.5 8 1 L8 2.5 L9 3.5 L9 10 L3 10 L3 3.5 L4 2.5 Z" fill="#a8d4f0" opacity="0.6"/>
  <!-- Bottle neck -->
  <rect x="4.5" y="2" width="3" height="1.5" rx="0.3" fill="#a8d4f0" opacity="0.5"/>
  <!-- Water level lines -->
  <line x1="3.5" y1="5" x2="8.5" y2="5" stroke="#7ab8e0" stroke-width="0.3" opacity="0.3"/>
  <line x1="3.5" y1="7" x2="8.5" y2="7" stroke="#7ab8e0" stroke-width="0.3" opacity="0.3"/>
  <!-- Cooler body -->
  <rect x="2" y="10" width="8" height="12" rx="0.8" fill="#f0f2f5" stroke="#c0c4cc" stroke-width="0.5"/>
  <!-- Top panel -->
  <rect x="2.5" y="10.5" width="7" height="3" rx="0.3" fill="#f8f8fa"/>
  <!-- Taps -->
  <circle cx="4.5" cy="15" r="0.8" fill="#4a7fc7"/>
  <circle cx="7.5" cy="15" r="0.8" fill="#c0c4cc"/>
  <!-- Tap labels -->
  <rect x="3.8" y="14.7" width="1.4" height="0.3" rx="0.1" fill="white" opacity="0.5"/>
  <rect x="6.8" y="14.7" width="1.4" height="0.3" rx="0.1" fill="#8890a0" opacity="0.5"/>
  <!-- Drip tray -->
  <rect x="3" y="17" width="6" height="0.8" rx="0.3" fill="#c0c4cc"/>
  <!-- Lower panel -->
  <rect x="3" y="19" width="6" height="2.5" rx="0.3" fill="#e8eaee"/>
  <!-- Legs -->
  <rect x="2.5" y="22" width="1" height="5.5" rx="0.3" fill="#c0c4cc"/>
  <rect x="8.5" y="22" width="1" height="5.5" rx="0.3" fill="#c0c4cc"/>
</svg>