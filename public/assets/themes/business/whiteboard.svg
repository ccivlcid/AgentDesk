<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 24">
  <!-- Aluminum frame -->
  <rect x="1" y="1" width="38" height="20" rx="0.5" fill="#c0c4cc"/>
  <!-- White board surface -->
  <rect x="2" y="2" width="36" height="18" rx="0.3" fill="#f8f8fa"/>
  <!-- Subtle content - lines and shapes -->
  <line x1="5" y1="6" x2="20" y2="6" stroke="#4a7fc7" stroke-width="0.5" opacity="0.6"/>
  <line x1="5" y1="9" x2="16" y2="9" stroke="#404858" stroke-width="0.4" opacity="0.4"/>
  <line x1="5" y1="12" x2="22" y2="12" stroke="#404858" stroke-width="0.4" opacity="0.3"/>
  <rect x="26" y="5" width="8" height="6" rx="0.5" fill="none" stroke="#4a7fc7" stroke-width="0.5" opacity="0.5"/>
  <circle cx="30" cy="8" r="1.5" fill="none" stroke="#8890a0" stroke-width="0.4" opacity="0.4"/>
  <!-- Bottom tray -->
  <rect x="4" y="21" width="32" height="1.5" rx="0.3" fill="#c0c4cc"/>
  <!-- Marker on tray -->
  <rect x="15" y="21.2" width="6" height="0.8" rx="0.3" fill="#404858"/>
  <rect x="23" y="21.2" width="4" height="0.8" rx="0.3" fill="#4a7fc7"/>
</svg>