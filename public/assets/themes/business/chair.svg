<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 28">
  <!-- Backrest mesh -->
  <rect x="4" y="1" width="12" height="12" rx="2" fill="#404858"/>
  <rect x="5" y="2" width="10" height="10" rx="1.5" fill="#505868" opacity="0.7"/>
  <!-- Mesh lines -->
  <line x1="7" y1="2" x2="7" y2="12" stroke="#606878" stroke-width="0.3"/>
  <line x1="10" y1="2" x2="10" y2="12" stroke="#606878" stroke-width="0.3"/>
  <line x1="13" y1="2" x2="13" y2="12" stroke="#606878" stroke-width="0.3"/>
  <!-- Seat -->
  <rect x="3" y="13" width="14" height="4" rx="1.5" fill="#404858"/>
  <rect x="4" y="13.5" width="12" height="2.5" rx="1" fill="#505868" opacity="0.5"/>
  <!-- Center post -->
  <rect x="9" y="17" width="2" height="5" fill="#c0c4cc"/>
  <!-- Chrome base star -->
  <line x1="2" y1="24" x2="10" y2="22" stroke="#c0c4cc" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="18" y1="24" x2="10" y2="22" stroke="#c0c4cc" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="4" y1="26" x2="10" y2="22" stroke="#c0c4cc" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="26" x2="10" y2="22" stroke="#c0c4cc" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Wheels -->
  <circle cx="2" cy="24.5" r="1" fill="#8890a0"/>
  <circle cx="18" cy="24.5" r="1" fill="#8890a0"/>
  <circle cx="4" cy="26.5" r="1" fill="#8890a0"/>
  <circle cx="16" cy="26.5" r="1" fill="#8890a0"/>
</svg>