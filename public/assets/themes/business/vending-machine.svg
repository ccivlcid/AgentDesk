<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 32">
  <!-- Machine body -->
  <rect x="1" y="1" width="20" height="30" rx="1" fill="#404858"/>
  <!-- Glass front -->
  <rect x="2.5" y="2.5" width="17" height="18" rx="0.5" fill="#2a2e38"/>
  <!-- Glass reflection -->
  <rect x="3" y="3" width="6" height="17" rx="0.3" fill="#505868" opacity="0.2"/>
  <!-- Shelf rows -->
  <line x1="3" y1="8" x2="19" y2="8" stroke="#606878" stroke-width="0.4"/>
  <line x1="3" y1="13.5" x2="19" y2="13.5" stroke="#606878" stroke-width="0.4"/>
  <!-- Items row 1 -->
  <rect x="4" y="4" width="3" height="3.5" rx="0.5" fill="#4a7fc7" opacity="0.6"/>
  <rect x="8" y="4" width="3" height="3.5" rx="0.5" fill="#8890a0" opacity="0.6"/>
  <rect x="12" y="4" width="3" height="3.5" rx="0.5" fill="#4a7fc7" opacity="0.4"/>
  <rect x="16" y="4.5" width="2.5" height="3" rx="0.5" fill="#c0c4cc" opacity="0.5"/>
  <!-- Items row 2 -->
  <rect x="4" y="9" width="3" height="4" rx="0.5" fill="#c0c4cc" opacity="0.5"/>
  <rect x="8" y="9" width="3" height="4" rx="0.5" fill="#4a7fc7" opacity="0.5"/>
  <rect x="12" y="9.5" width="3" height="3.5" rx="0.5" fill="#8890a0" opacity="0.5"/>
  <!-- Items row 3 -->
  <rect x="4" y="14.5" width="3" height="4.5" rx="0.5" fill="#8890a0" opacity="0.4"/>
  <rect x="8" y="14.5" width="3" height="4.5" rx="0.5" fill="#c0c4cc" opacity="0.4"/>
  <!-- Control panel -->
  <rect x="3" y="22" width="16" height="4" rx="0.5" fill="#363a44"/>
  <!-- Keypad -->
  <rect x="4" y="22.5" width="6" height="3" rx="0.3" fill="#505868"/>
  <!-- Display -->
  <rect x="11.5" y="23" width="6" height="1.5" rx="0.3" fill="#1a2a44"/>
  <rect x="12" y="23.3" width="5" height="0.8" rx="0.2" fill="#4a7fc7" opacity="0.4"/>
  <!-- Dispensing slot -->
  <rect x="3" y="27" width="16" height="3" rx="0.5" fill="#2a2e38"/>
</svg>