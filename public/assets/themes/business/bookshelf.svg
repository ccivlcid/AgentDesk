<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 26">
  <!-- Shelf frame -->
  <rect x="1" y="0.5" width="18" height="25" rx="0.5" fill="#f0f2f5" stroke="#c0c4cc" stroke-width="0.5"/>
  <!-- Shelf dividers -->
  <rect x="1" y="6.5" width="18" height="0.6" fill="#c0c4cc"/>
  <rect x="1" y="12.5" width="18" height="0.6" fill="#c0c4cc"/>
  <rect x="1" y="18.5" width="18" height="0.6" fill="#c0c4cc"/>
  <!-- Top shelf books -->
  <rect x="3" y="1.5" width="2" height="5" rx="0.3" fill="#4a7fc7"/>
  <rect x="5.5" y="2" width="2" height="4.5" rx="0.3" fill="#404858"/>
  <rect x="8" y="1.5" width="1.8" height="5" rx="0.3" fill="#8890a0"/>
  <rect x="10.5" y="2.5" width="2.5" height="4" rx="0.3" fill="#4a7fc7" opacity="0.6"/>
  <!-- Second shelf items -->
  <rect x="3" y="7.5" width="5" height="4.5" rx="0.3" fill="#404858" opacity="0.5"/>
  <rect x="12" y="8" width="2" height="4.5" rx="0.3" fill="#c0c4cc"/>
  <rect x="14.5" y="8.5" width="2" height="4" rx="0.3" fill="#8890a0"/>
  <!-- Third shelf -->
  <rect x="4" y="13.5" width="2" height="5" rx="0.3" fill="#404858" opacity="0.7"/>
  <rect x="7" y="14" width="2" height="4.5" rx="0.3" fill="#4a7fc7" opacity="0.5"/>
  <!-- Bottom shelf - folders -->
  <rect x="3" y="19.5" width="3" height="5" rx="0.3" fill="#f8f8fa" stroke="#c0c4cc" stroke-width="0.3"/>
  <rect x="7" y="19.5" width="3" height="5" rx="0.3" fill="#f8f8fa" stroke="#c0c4cc" stroke-width="0.3"/>
</svg>