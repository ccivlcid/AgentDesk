<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        width: 720pt; height: 405pt;
        font-family: "Pretendard", -apple-system, BlinkMacSystemFont, sans-serif;
        background: #f5f5f0;
        padding: 48pt;
        display: grid; grid-template-columns: 1fr 1.8fr; gap: 48pt;
      }
    </style>
  </head>
  <body>
    <div style="display: flex; flex-direction: column; justify-content: flex-end">
      <p style="font-size: 9pt; color: #999999; margin-bottom: 16pt; letter-spacing: 0.02em">ANALYSIS REPORT</p>
      <h1 style="font-size: 48pt; font-weight: 500; color: #1a1a1a; letter-spacing: -0.02em; line-height: 1.1">Contents</h1>
    </div>

    <div style="display: flex; flex-direction: column; justify-content: center; gap: 10pt">
      <div style="display: flex; align-items: center; gap: 16pt; padding: 12pt 0; border-bottom: 1px solid #d4d4d0">
        <div style="display: inline-block; padding: 4pt 10pt; background: #c0392b; border-radius: 4pt"><p style="font-size: 8pt; font-weight: 600; color: #ffffff">01</p></div>
        <p style="flex: 1; font-size: 13pt; font-weight: 500; color: #1a1a1a">Executive Summary</p>
      </div>
      <div style="display: flex; align-items: center; gap: 16pt; padding: 12pt 0; border-bottom: 1px solid #d4d4d0">
        <div style="display: inline-block; padding: 4pt 10pt; background: #c0392b; border-radius: 4pt"><p style="font-size: 8pt; font-weight: 600; color: #ffffff">02</p></div>
        <p style="flex: 1; font-size: 13pt; font-weight: 500; color: #1a1a1a">Architecture Analysis</p>
      </div>
      <div style="display: flex; align-items: center; gap: 16pt; padding: 12pt 0; border-bottom: 1px solid #d4d4d0">
        <div style="display: inline-block; padding: 4pt 10pt; background: #c0392b; border-radius: 4pt"><p style="font-size: 8pt; font-weight: 600; color: #ffffff">03</p></div>
        <p style="flex: 1; font-size: 13pt; font-weight: 500; color: #1a1a1a">Department &amp; AI Provider Ecosystem</p>
      </div>
      <div style="display: flex; align-items: center; gap: 16pt; padding: 12pt 0; border-bottom: 1px solid #d4d4d0">
        <div style="display: inline-block; padding: 4pt 10pt; background: #c0392b; border-radius: 4pt"><p style="font-size: 8pt; font-weight: 600; color: #ffffff">04</p></div>
        <p style="flex: 1; font-size: 13pt; font-weight: 500; color: #1a1a1a">Core Features &amp; Technology Stack</p>
      </div>
      <div style="display: flex; align-items: center; gap: 16pt; padding: 12pt 0; border-bottom: 1px solid #d4d4d0">
        <div style="display: inline-block; padding: 4pt 10pt; background: #c0392b; border-radius: 4pt"><p style="font-size: 8pt; font-weight: 600; color: #ffffff">05</p></div>
        <p style="flex: 1; font-size: 13pt; font-weight: 500; color: #1a1a1a">Security &amp; Quantitative Metrics</p>
      </div>
      <div style="display: flex; align-items: center; gap: 16pt; padding: 12pt 0">
        <div style="display: inline-block; padding: 4pt 10pt; background: #c0392b; border-radius: 4pt"><p style="font-size: 8pt; font-weight: 600; color: #ffffff">06</p></div>
        <p style="flex: 1; font-size: 13pt; font-weight: 500; color: #1a1a1a">Risk Assessment &amp; Roadmap</p>
      </div>
    </div>
  </body>
</html>
