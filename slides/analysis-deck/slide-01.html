<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        width: 720pt; height: 405pt;
        font-family: "Pretendard", -apple-system, BlinkMacSystemFont, sans-serif;
        background: #0f0f0f;
        padding: 36pt 48pt;
        display: flex; flex-direction: column; justify-content: space-between;
      }
    </style>
  </head>
  <body>
    <div style="display: flex; justify-content: space-between; align-items: center">
      <div style="display: flex; align-items: center; gap: 12pt">
        <img src="https://raw.githubusercontent.com/agentdesk/agentdesk/main/public/agentdesk.png"
             style="width: 32pt; height: 32pt; border-radius: 6pt" />
        <p style="font-size: 13pt; font-weight: 600; color: #ffffff">AgentDesk</p>
      </div>
      <div style="display: inline-block; padding: 5pt 14pt; border: 1px solid #444444; border-radius: 16pt">
        <p style="font-size: 9pt; font-weight: 500; color: #999999; letter-spacing: 0.04em">ANALYSIS REPORT</p>
      </div>
    </div>

    <div>
      <div style="display: inline-block; padding: 5pt 14pt; background: #c0392b; border-radius: 4pt; margin-bottom: 20pt">
        <p style="font-size: 9pt; font-weight: 600; color: #ffffff; letter-spacing: 0.03em">PROJECT ANALYSIS</p>
      </div>
      <h1 style="font-size: 48pt; font-weight: 600; color: #ffffff; letter-spacing: -0.02em; line-height: 1.1">
        AgentDesk
      </h1>
      <p style="font-size: 20pt; color: #888888; margin-top: 12pt; line-height: 1.4">
        AI Agent Office Simulator
      </p>
      <p style="font-size: 14pt; color: #555555; margin-top: 8pt">
        Codebase Analysis &amp; Architecture Review
      </p>
    </div>

    <div style="display: flex; gap: 56pt">
      <div>
        <p style="font-size: 9pt; color: #555555; margin-bottom: 4pt">VERSION</p>
        <p style="font-size: 11pt; font-weight: 500; color: #cccccc">v1.0.8</p>
      </div>
      <div>
        <p style="font-size: 9pt; color: #555555; margin-bottom: 4pt">STACK</p>
        <p style="font-size: 11pt; font-weight: 500; color: #cccccc">React 19 + Express 5</p>
      </div>
      <div>
        <p style="font-size: 9pt; color: #555555; margin-bottom: 4pt">CODEBASE</p>
        <p style="font-size: 11pt; font-weight: 500; color: #cccccc">444 files / 33K+ LOC</p>
      </div>
      <div>
        <p style="font-size: 9pt; color: #555555; margin-bottom: 4pt">DATE</p>
        <p style="font-size: 11pt; font-weight: 500; color: #cccccc">March 2026</p>
      </div>
    </div>
  </body>
</html>
